<!-- Chatbot Widget UMCE Virtual -->
<div id="umce-chatbot">
  <!-- FAB Button -->
  <button id="chat-fab" aria-label="Abrir asistente virtual" class="fixed bottom-6 right-[5.5rem] z-50 w-14 h-14 bg-umce-azul text-white rounded-full shadow-lg hover:bg-umce-azul-light transition-all duration-200 flex items-center justify-center hover:scale-105">
    <svg id="chat-fab-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    <svg id="chat-fab-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>

  <!-- Chat Panel -->
  <div id="chat-panel" class="fixed bottom-24 right-[5.5rem] z-50 w-[380px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden transition-all duration-300 origin-bottom-right scale-0 opacity-0" style="height: 520px; max-height: calc(100vh - 8rem);">

    <!-- Header -->
    <div class="bg-umce-azul text-white px-5 py-4 flex items-center gap-3 flex-shrink-0">
      <div class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/></svg>
      </div>
      <div>
        <h3 class="font-heading font-bold text-sm">Asistente UMCE Virtual</h3>
        <p class="text-white/70 text-xs">Consulta sobre cursos y servicios</p>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
      <div class="chat-msg assistant">
        <div class="bg-gray-50 rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-gray-700 max-w-[85%]">
          &iexcl;Hola! Soy el asistente virtual de la UDFV. Puedo ayudarte con informaci&oacute;n sobre cursos, programas, plataformas Moodle y servicios. &iquest;En qu&eacute; te puedo ayudar?
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div id="chat-quick-actions" class="px-4 pb-2 flex flex-wrap gap-1.5 flex-shrink-0">
      <button class="chat-chip">&iquest;Qu&eacute; cursos hay?</button>
      <button class="chat-chip">&iquest;C&oacute;mo me inscribo?</button>
      <button class="chat-chip">No puedo ingresar</button>
    </div>

    <!-- Input -->
    <div class="px-4 pb-4 flex-shrink-0">
      <form id="chat-form" class="flex gap-2">
        <input id="chat-input" type="text" placeholder="Escribe tu consulta..." maxlength="2000" autocomplete="off"
          class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-umce-azul focus:ring-1 focus:ring-umce-azul/20 transition-colors">
        <button type="submit" id="chat-send" disabled
          class="bg-umce-azul text-white rounded-xl px-3 py-2.5 hover:bg-umce-azul-light transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        </button>
      </form>
      <p class="text-[10px] text-gray-300 text-center mt-1.5">Asistente IA &mdash; Las respuestas pueden contener errores</p>
    </div>
  </div>
</div>

<style>
  .chat-msg { display: flex; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg.user > div { background: #0033A1; color: white; border-radius: 1rem 1rem 0.25rem 1rem; }
  .chat-msg.assistant > div { background: #F9FAFB; border-radius: 1rem 1rem 1rem 0.25rem; }
  .chat-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 999px;
    background: #F3F4F6; color: #4B5563; border: 1px solid #E5E7EB;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .chat-chip:hover { background: #E5E7EB; border-color: #D1D5DB; }
  .chat-typing { display: flex; gap: 4px; padding: 4px 0; }
  .chat-typing span { width: 6px; height: 6px; background: #9CA3AF; border-radius: 50%; animation: chatBounce 1.4s infinite; }
  .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes chatBounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  #chat-panel.open { transform: scale(1); opacity: 1; }
  @media (max-width: 480px) {
    #chat-panel { width: calc(100vw - 1rem); right: 0.5rem; bottom: 5rem; height: calc(100vh - 6rem); max-height: none; border-radius: 1rem; z-index: 100000; }
    #chat-fab { bottom: 1rem; right: 4.5rem; }
  }
</style>
