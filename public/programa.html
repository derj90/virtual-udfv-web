<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- === SEO base — programa.html === -->
  <!-- Nota: title, og:title, og:description y canonical se actualizan dinamicamente via JS -->
  <title>Programa — UMCE Virtual</title>
  <meta name="description" content="Diplomado y rutas formativas en competencias digitales, pedagogia e inteligencia artificial para docentes. Universidad Metropolitana de Ciencias de la Educacion.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://virtual.udfv.cloud/programa/">
  <!-- Open Graph base (actualizar con JS) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://virtual.udfv.cloud/programa/">
  <meta property="og:title" content="Programa — UMCE Virtual">
  <meta property="og:description" content="Diplomados y rutas formativas para docentes UMCE. Formacion online en competencias digitales e inteligencia artificial.">
  <meta property="og:image" content="https://virtual.udfv.cloud/assets/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="UMCE Virtual">
  <meta property="og:locale" content="es_CL">
  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Programa — UMCE Virtual">
  <meta name="twitter:description" content="Diplomados y rutas formativas para docentes UMCE.">
  <meta name="twitter:image" content="https://virtual.udfv.cloud/assets/og-default.png">
  
  
  
  <link rel="stylesheet" href="/shared/tailwind.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
</head>
<body class="bg-white text-gray-900 antialiased">

  <div id="nav-placeholder"></div>

  <!-- Hero (populated by JS) -->
  <section id="program-hero" class="hero-gradient pt-28 pb-16 text-white relative overflow-hidden">
    <div class="absolute inset-0 opacity-[0.04]" style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size: 40px 40px;"></div>
    <div class="max-w-7xl mx-auto px-6 relative z-10">
      <nav class="breadcrumb text-sm mb-6">
        <a href="/" class="text-white/60 hover:text-white">Inicio</a>
        <span class="separator text-white/30">/</span>
        <a href="/catalogo" class="text-white/60 hover:text-white">Cat&aacute;logo</a>
        <span class="separator text-white/30">/</span>
        <span id="breadcrumb-title" class="text-white/90">Cargando...</span>
      </nav>
      <div id="hero-content">
        <div class="skeleton h-6 w-32 mb-4" style="background: rgba(255,255,255,0.1);"></div>
        <div class="skeleton h-10 w-3/4 mb-4" style="background: rgba(255,255,255,0.1);"></div>
        <div class="skeleton h-5 w-full max-w-lg" style="background: rgba(255,255,255,0.1);"></div>
      </div>
    </div>
  </section>

  <main class="py-16">
    <div class="max-w-7xl mx-auto px-6">
      <div id="program-content" class="grid lg:grid-cols-3 gap-12">
        <!-- Left: Main content (2 cols) -->
        <div class="lg:col-span-2 space-y-12">
          <div class="skeleton h-40 w-full"></div>
          <div class="skeleton h-60 w-full"></div>
        </div>
        <!-- Right: Sidebar -->
        <div>
          <div class="skeleton h-80 w-full"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="chatbot-placeholder"></div>

  <script src="/shared/shared.js"></script>
  <script src="/shared/chatbot.js" defer></script>
  <script>
    async function loadProgram() {
      const slug = UMCE.getSlugFromPath();
      if (!slug) { window.location.href = '/catalogo'; return; }

      try {
        const resp = await fetch(`/api/catalog/programs/${encodeURIComponent(slug)}`);
        if (!resp.ok) throw new Error('Not found');
        const p = await resp.json();

        document.title = `${p.title} — UMCE Virtual`;
        // Actualizar meta tags SEO dinamicamente
        document.querySelector('meta[name="description"]')?.setAttribute('content',
          `${UMCE.truncate(UMCE.stripHtml(p.description || ''), 150)} — ${UMCE.typeLabel(p.type)} UMCE Virtual.`
        );
        document.querySelector('link[rel="canonical"]')?.setAttribute('href',
          `https://virtual.udfv.cloud/programa/${p.slug}`
        );
        document.querySelector('meta[property="og:url"]')?.setAttribute('content',
          `https://virtual.udfv.cloud/programa/${p.slug}`
        );
        document.querySelector('meta[property="og:title"]')?.setAttribute('content',
          `${p.title} — UMCE Virtual`
        );
        document.querySelector('meta[property="og:description"]')?.setAttribute('content',
          UMCE.truncate(UMCE.stripHtml(p.description || ''), 150)
        );
        document.querySelector('meta[name="twitter:title"]')?.setAttribute('content',
          `${p.title} — UMCE Virtual`
        );
        document.querySelector('meta[name="twitter:description"]')?.setAttribute('content',
          UMCE.truncate(UMCE.stripHtml(p.description || ''), 150)
        );
        document.getElementById('breadcrumb-title').textContent = UMCE.truncate(p.title, 40);

        // Hero background image (overlay gradient keeps SVG text hidden)
        if (p.image_url) {
          const hero = document.getElementById('program-hero');
          hero.style.backgroundImage = `linear-gradient(to bottom, rgba(0,34,128,0.95) 0%, rgba(0,29,92,1) 45%, rgba(0,29,92,1) 100%), url(${p.image_url})`;
          hero.style.backgroundSize = 'cover, cover';
          hero.style.backgroundPosition = 'center, center';
        }

        // Hero
        const E = UMCE.esc;
        document.getElementById('hero-content').innerHTML = `
          <span class="inline-block badge ${UMCE.typeBadgeClass(p.type)} mb-4">${E(UMCE.typeLabel(p.type))}</span>
          <h1 class="font-heading text-3xl md:text-4xl lg:text-5xl font-extrabold mb-4 break-words">${E(p.title)}</h1>
          <p class="text-white/80 text-lg max-w-2xl">${E((p.description || '').split('\n')[0])}</p>
          <div class="flex flex-wrap gap-6 mt-8 text-sm text-white/70">
            ${p.stats && p.stats.semesters ? `<span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${E(p.stats.semesters)}</span>` : p.duration_hours ? `<span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${E(p.duration_hours)} horas</span>` : ''}
            ${p.modality ? `<span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>${p.modality === 'virtual' ? '100% Virtual' : p.modality === 'b-learning' ? 'B-Learning' : E(p.modality)}</span>` : ''}
            ${p.level ? `<span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>${E(p.level.charAt(0).toUpperCase() + p.level.slice(1))}</span>` : ''}
          </div>
        `;

        // Content
        const objectives = p.objectives || [];
        const curriculum = p.curriculum || [];
        const courses = p.courses || [];
        const team = p.team || [];
        const testimonials = p.testimonials || [];

        document.getElementById('program-content').innerHTML = `
          <!-- Left column -->
          <div class="lg:col-span-2 space-y-12">
            ${p.description ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Acerca del programa</h2>
                <div class="prose prose-gray max-w-none text-gray-600 leading-relaxed space-y-4">
                  ${p.description.split('\n').filter(para => para.trim()).map(para => '<p>' + E(para.trim()) + '</p>').join('')}
                </div>
              </section>
            ` : ''}

            ${objectives.length ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Objetivos del programa</h2>
                <ul class="space-y-3">
                  ${objectives.map(o => `
                    <li class="flex items-start gap-3">
                      <svg class="w-5 h-5 text-umce-verde mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                      <span class="text-gray-600">${E(o)}</span>
                    </li>
                  `).join('')}
                </ul>
              </section>
            ` : ''}

            ${curriculum.length ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Malla curricular</h2>
                <div class="space-y-4">
                  ${curriculum.map((mod, i) => {
                    const title = mod.title || mod.titulo || (typeof mod === 'string' ? mod : '');
                    const hours = mod.horas || null;
                    const subjects = mod.asignaturas || mod.cursos || [];
                    const desc = mod.description || mod.modulo || '';
                    return `
                    <div class="bg-gray-50 rounded-xl p-5 border border-gray-100">
                      <div class="flex items-center gap-3 mb-2">
                        <span class="w-8 h-8 rounded-lg bg-umce-azul text-white flex items-center justify-center text-sm font-bold">${E(mod.semestre || mod.nivel || (i + 1))}</span>
                        <h3 class="font-heading font-semibold">${E(title)}</h3>
                        ${hours ? '<span class="text-xs text-gray-400 ml-auto">' + E(hours) + 'h</span>' : ''}
                      </div>
                      ${desc ? '<p class="text-gray-500 text-sm ml-11 mb-2">' + E(desc) + '</p>' : ''}
                      ${subjects.length ? '<ul class="ml-11 space-y-1.5">' + subjects.map(s =>
                        '<li class="flex items-start gap-2 text-sm text-gray-600"><svg class="w-4 h-4 text-gray-300 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>' + E(s) + '</li>'
                      ).join('') + '</ul>' : ''}
                    </div>`;
                  }).join('')}
                </div>
              </section>
            ` : ''}

            ${courses.length ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Cursos incluidos</h2>
                <div class="grid sm:grid-cols-2 gap-4">
                  ${courses.map(c => `
                    <a href="/curso/${E(c.slug)}" class="bg-white rounded-xl p-5 border border-gray-100 card-hover block">
                      <h3 class="font-heading font-semibold text-sm mb-1">${E(c.title)}</h3>
                      <p class="text-gray-400 text-xs">${c.duration_hours ? E(c.duration_hours) + 'h' : ''} ${c.category ? '· ' + E(c.category) : ''}</p>
                    </a>
                  `).join('')}
                </div>
              </section>
            ` : ''}

            ${team.length ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Equipo docente</h2>
                <div class="grid sm:grid-cols-2 gap-4">
                  ${team.map(m => `
                    <div class="flex items-center gap-4 bg-gray-50 rounded-xl p-4">
                      <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden flex-shrink-0">
                        ${m.photo_url
                          ? `<img src="${E(m.photo_url)}" alt="${E(m.name)}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'font-heading font-bold text-gray-400\\'>${E(m.name).charAt(0)}</span>'">`
                          : `<span class="font-heading font-bold text-gray-400">${E(m.name).charAt(0)}</span>`
                        }
                      </div>
                      <div>
                        <div class="font-heading font-semibold text-sm">${E(m.name)}</div>
                        <div class="text-gray-500 text-xs">${E(m.role_in_program || m.role || '')}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </section>
            ` : ''}

            ${testimonials.length ? `
              <section>
                <h2 class="font-heading text-2xl font-bold mb-6">Testimonios</h2>
                <div class="space-y-4">
                  ${testimonials.map(t => `
                    <blockquote class="bg-gray-50 rounded-xl p-6 border-l-4 border-umce-amarillo">
                      <p class="text-gray-600 italic mb-3">"${E(t.content)}"</p>
                      <div class="text-sm">
                        <span class="font-semibold text-gray-900">${E(t.author_name)}</span>
                        ${t.author_role ? `<span class="text-gray-400"> — ${E(t.author_role)}</span>` : ''}
                      </div>
                    </blockquote>
                  `).join('')}
                </div>
              </section>
            ` : ''}
          </div>

          <!-- Sidebar -->
          <div>
            <div class="sticky top-24 bg-gray-50 rounded-2xl p-6 border border-gray-100">
              <h3 class="font-heading font-bold text-lg mb-4">Informaci&oacute;n del programa</h3>
              <dl class="space-y-4 text-sm">
                <div>
                  <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Tipo</dt>
                  <dd class="font-medium">${UMCE.typeLabel(p.type)}</dd>
                </div>
                ${p.stats && p.stats.semesters ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Duraci&oacute;n</dt>
                    <dd class="font-medium">${E(p.stats.semesters)}</dd>
                  </div>
                ` : p.duration_hours ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Duraci&oacute;n</dt>
                    <dd class="font-medium">${p.duration_hours} horas</dd>
                  </div>
                ` : ''}
                ${p.modality ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Modalidad</dt>
                    <dd class="font-medium">${p.modality === 'virtual' ? '100% Virtual' : p.modality === 'b-learning' ? 'B-Learning (virtual + presencial)' : p.modality}</dd>
                  </div>
                ` : ''}
                ${p.stats && p.stats.department ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Departamento</dt>
                    <dd class="font-medium">${E(p.stats.department)}</dd>
                  </div>
                ` : ''}
                ${p.stats && p.stats.training_lines ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">L&iacute;neas de formaci&oacute;n</dt>
                    <dd class="font-medium text-xs leading-relaxed">${E(p.stats.training_lines)}</dd>
                  </div>
                ` : ''}
                ${p.stats && p.stats.schedule ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Horario</dt>
                    <dd class="font-medium text-xs">${E(p.stats.schedule)}</dd>
                  </div>
                ` : ''}
                ${p.level ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Nivel</dt>
                    <dd class="font-medium">${p.level.charAt(0).toUpperCase() + p.level.slice(1)}</dd>
                  </div>
                ` : ''}
                ${courses.length ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Cursos</dt>
                    <dd class="font-medium">${courses.length} cursos</dd>
                  </div>
                ` : ''}
                ${p.tags && p.tags.length ? `
                  <div>
                    <dt class="text-gray-400 text-xs uppercase tracking-wider mb-1">Temas</dt>
                    <dd class="flex flex-wrap gap-1.5">${p.tags.map(t => `<span class="bg-white text-gray-600 text-xs px-2.5 py-1 rounded-full border border-gray-200">${E(t)}</span>`).join('')}</dd>
                  </div>
                ` : ''}
              </dl>

              ${p.stats && p.stats.enrollment_url ? `
                <a href="${E(p.stats.enrollment_url)}" target="_blank" rel="noopener noreferrer" class="mt-6 w-full inline-flex items-center justify-center gap-2 text-white font-heading font-bold text-sm px-6 py-3 rounded-lg transition-colors" style="background: var(--palette-primary);">
                  Postular al programa
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
              ` : p.moodle_url ? `
                <a href="${E(p.moodle_url)}" target="_blank" rel="noopener noreferrer" class="mt-6 w-full inline-flex items-center justify-center gap-2 text-white font-heading font-bold text-sm px-6 py-3 rounded-lg transition-colors" style="background: var(--palette-primary);">
                  Ir al programa
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
              ` : `
                <div class="mt-6 bg-umce-azul-light/20 border border-umce-azul/20 rounded-xl p-5 text-center">
                  <p class="text-umce-azul-dark font-semibold text-sm mb-1">¿Te interesa este programa?</p>
                  <p class="text-gray-600 text-xs mb-4">Escríbenos para recibir información sobre próximas cohortes e inscripción.</p>
                  <a href="mailto:udfv@umce.cl?subject=Consulta%20sobre%20${encodeURIComponent(p.title)}"
                     class="inline-flex items-center justify-center gap-2 bg-umce-amarillo text-umce-azul-dark font-heading font-bold text-sm px-6 py-3 rounded-lg hover:bg-yellow-400 transition-colors w-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    Consultar por este programa
                  </a>
                </div>
              `}

              <a href="/catalogo" class="mt-3 w-full inline-flex items-center justify-center gap-2 border border-gray-200 text-gray-600 font-heading font-semibold text-sm px-6 py-3 rounded-lg hover:border-umce-azul hover:text-umce-azul transition-colors">
                Ver m&aacute;s programas
              </a>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('hero-content').innerHTML = '';
        document.getElementById('program-content').innerHTML = `
          <div class="lg:col-span-3 text-center py-20">
            <h2 class="font-heading text-2xl font-bold text-gray-900 mb-4">Programa no encontrado</h2>
            <p class="text-gray-500 mb-6">El programa que buscas no existe o ha sido removido.</p>
            <a href="/catalogo" class="inline-flex items-center gap-2 bg-umce-azul text-white font-heading font-semibold text-sm px-6 py-3 rounded-lg hover:bg-umce-azul-light transition-colors">Ver cat&aacute;logo</a>
          </div>
        `;
      }
    }

    loadProgram();
  </script>
  <script src="/accesibilidad-dua.js" defer></script>
</body>
</html>
